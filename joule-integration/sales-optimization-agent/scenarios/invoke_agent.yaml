description: Everything related to sales inquiries and orders. Call this whenever the user asks for optimizing any sales inquiry or order from any customer. For example, "Optimize the latest sales inquiry from customer Altinova"

target:
  type: function
  name: call_agent
  parameters:
    - name: contextId
      value: $capability_context.contextId
    - name: taskId
      value: $capability_context.taskId


capability_context:
    - name: contextId
      value: $target_result.contextId
    - name: taskId
      value: $target_result.taskId